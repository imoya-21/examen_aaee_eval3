services:
  database:
    image: mariadb:10.11
    container_name: mariadb_hogwarts
    restart: always
    env_file:
      - .env
    environment:
      # Usamos las variables de tu .env
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      # Permitimos que inicie sin pass de root para simplificar (solo si es entorno controlado)
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    image: ghcr.io/imoya-21/aaee_mapamundi_sb:latest
    container_name: aaee_mapamundi_app_imy
    restart: always
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - database
    environment:
      # Conectamos Spring Boot usando tus variables exactas
      SPRING_DATASOURCE_URL: jdbc:mariadb://${DB_HOST}:${DB_PORT}/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

volumes:
  db_data:
